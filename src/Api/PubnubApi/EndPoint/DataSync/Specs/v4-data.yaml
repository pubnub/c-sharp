              items:
                $ref: "#/components/schemas/EntityResource"

    ChannelEnvelope:
      description: Enveloped single channel
      allOf:
        - $ref: "#/components/schemas/ResponseEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/EntityResource"

    UpdateChannelRequest:
      description: Request body for updating a channel
      allOf:
        - $ref: "#/components/schemas/RequestEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/UpdateEntityProperties"

    CreateChannelRequest:
      description: Request body for creating a channel
      allOf:
        - $ref: "#/components/schemas/RequestEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CreateChannelRequestData"

    MembershipsEnvelope:
      description: Enveloped list of memberships
      allOf:
        - $ref: "#/components/schemas/ResponseEnvelope"
        - type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/RelationshipResource"

    MembershipEnvelope:
      description: Enveloped single membership
      allOf:
        - $ref: "#/components/schemas/ResponseEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/RelationshipResource"

    UpdateMembershipRequest:
      description: Request body for updating a membership
      allOf:
        - $ref: "#/components/schemas/RequestEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/UpdateRelationshipProperties"

    CreateMembershipRequest:
      description: Request body for creating a membership
      allOf:
        - $ref: "#/components/schemas/RequestEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CreateMembershipRequestData"

    CreateUserRequestData:
      description: Data payload for creating a user
      allOf:
        - $ref: "#/components/schemas/Payload"
        - type: object
          required: ["entityClassVersion"]
          properties:
            id:
              type: string
              minLength: 1
              maxLength: 255
              description: User identifier (optional - server generates if not provided)
            entityClassVersion:
              type: integer
              minimum: 1
              description: Version of the entity class
            status:
              type: string
              minLength: 1
              maxLength: 100
              description: User status

    CreateChannelRequestData:
      description: Data payload for creating a channel
      allOf:
        - $ref: "#/components/schemas/Payload"
        - type: object
          required: ["entityClassVersion"]
          properties:
            id:
              type: string
              minLength: 1
              maxLength: 255
              description: Channel identifier (optional - server generates if not provided)
            entityClassVersion:
              type: integer
              minimum: 1
              description: Version of the entity class
            status:
              type: string
              minLength: 1
              maxLength: 100
              description: Channel status

    CreateMembershipRequestData:
      description: Data payload for creating a membership
      allOf:
        - $ref: "#/components/schemas/Payload"
        - type: object
          required: ["channelId", "userId", "relationshipClassVersion"]
          properties:
            id:
              type: string
              minLength: 1
              maxLength: 255
              description: Membership identifier (optional - server generates if not provided)
            channelId:
              type: string
              minLength: 1
              maxLength: 255
              description: Channel ID reference (maps to entityAId)
            userId:
              type: string
              minLength: 1
              maxLength: 255
              description: User ID reference (maps to entityBId)
            relationshipClassVersion:
              type: integer
              minimum: 1
              description: Version of the Membership relationship class
            status:
              type: string
              minLength: 1
              maxLength: 100
              description: Membership status

    CreateEntityRequestData:
      description: Data payload for creating an entity (includes optional id field)
      allOf:
        - type: object
          properties:
            id:
              type: string
              minLength: 1
              maxLength: 255
              description: Entity identifier (optional - server generates if not provided)
        - $ref: "#/components/schemas/EntityProperties"

    CreateRelationshipRequestData:
      description: Data payload for creating a relationship
      allOf:
        - type: object
          properties:
            id:
              type: string
              minLength: 1
              maxLength: 255
              description: Relationship identifier (optional - server generates if not provided)
        - $ref: "#/components/schemas/RelationshipProperties"

    DefaultProperties:
      allOf:
        - $ref: 'common.yaml#/components/schemas/DefaultProperties'
        - type: object
          properties:
            expiresAt:
              type: string
              format: date-time
              description: Date and time when the entity expires (will be deleted automatically).
          example:
            expiresAt: "2021-01-01T00:00:00.000Z"

    Payload:
      description: User-defined custom properties.
      type: object
      properties:
        payload:
          format: objectNode
          type: object

    LegacyCustom:
      description: Legacy user-defined custom properties
      type: object
      properties:
        custom:
          type: object
          additionalProperties: true

    UserProperties:
      description: Writable properties for User resource
      allOf:
        - $ref: "#/components/schemas/LegacyCustom"
        - type: object
          properties:
            name:
              type: string
              minLength: 1
              maxLength: 255
              description: User's display name
            externalId:
              type: string
              minLength: 1
              maxLength: 255
              description: External system identifier for the user
            profileUrl:
              type: string
              format: uri
              description: URL to the user's profile
            email:
              type: string
              format: email
              description: User's email address
            type:
              type: string
              description: User type
            status:
              type: string
              minLength: 1
              maxLength: 100
              description: User status
      example:
        name: John Doe
        externalId: ext-user-789
        profileUrl: https://example.com/users/johndoe
        email: johndoe@example.com
        type: admin
        status: active
        custom:
          key: value
          but:
            canbe: better

    ChannelProperties:
      description: Writable properties for Channel resource
      allOf:
        - $ref: "#/components/schemas/LegacyCustom"
        - type: object
          properties:
            name:
              type: string
              minLength: 1
              maxLength: 255
              description: Channel name
            description:
              type: string
              maxLength: 1000
              description: Channel description
            type:
              type: string
              description: Channel type
            status:
              type: string
              minLength: 1
              maxLength: 100
              description: Channel status
      example:
        name: General Chat
        type: 1to1
        description: A channel for general discussions
        status: active
        custom:
          category: general
          topic: announcements

    MembershipProperties:
      description: Writable properties for Membership resource
      allOf:
        - $ref: "#/components/schemas/LegacyCustom"
        - type: object
          required: ["userId", "channelId"]
          properties:
            userId:
              type: string
              minLength: 1
              maxLength: 255
              description: User ID reference
            channelId:
              type: string
              minLength: 1
              maxLength: 255
              description: Channel ID reference
            status:
              type: string
              minLength: 1
              maxLength: 100
              description: Membership status
      example:
        userId: u456
        channelId: c789
        status: active
        custom:
          role: moderator
          permissions: read-write

    EntityProperties:
      description: Writable properties for Entity resource
      allOf:
        - $ref: "#/components/schemas/Payload"
        - type: object
          required: ["entityClass", "entityClassVersion"]
          properties:
            entityClass:
              type: string
              minLength: 1
              description: Entity class identifier
            entityClassVersion:
              type: integer
              minimum: 1
              description: Version of an Entity Class
            status:
              type: string
              minLength: 1
              maxLength: 100
              description: Entity status
      example:
        status: active
        entityClass: user
        entityClassVersion: 1
        payload:
          custom: fields

    RelationshipProperties:
      description: Writable properties for Relationship resource
      allOf:
        - $ref: "#/components/schemas/Payload"
        - type: object
          required: ["entityAId", "entityBId", "relationshipClass", "relationshipClassVersion"]
          properties:
            entityAId:
              type: string
              minLength: 1
              maxLength: 255
              description: First entity ID
            entityBId:
              type: string
              minLength: 1
              maxLength: 255
              description: Second entity ID
            relationshipClass:
              type: string
              minLength: 1
              description: Relationship class identifier
            relationshipClassVersion:
              type: integer
              minimum: 1
              description: Version of the relationship class
            status:
              type: string
              minLength: 1
              maxLength: 100
              description: Relationship status
      example:
        entityAId: u123
        entityBId: s456
        relationshipClass: ProductOwner
        relationshipClassVersion: 1
        status: active
        payload:
          custom: fields

    JsonPatchOperation:
      $ref: 'common.yaml#/components/schemas/JsonPatchOperation'
    JsonPatch:
      $ref: 'common.yaml#/components/schemas/JsonPatch'
