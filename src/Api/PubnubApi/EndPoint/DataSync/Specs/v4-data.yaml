        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    PreconditionFailedResponse:
      description: Precondition Failed - ETag doesn't match current resource version
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailableResponse:
      description: Service Unavailable - service not available
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  parameters:
    IfMatch:
      $ref: 'common.yaml#/components/parameters/IfMatch'
    Cursor:
      $ref: 'common.yaml#/components/parameters/Cursor'
    Limit:
      $ref: 'common.yaml#/components/parameters/Limit'
    Filter:
      $ref: 'common.yaml#/components/parameters/Filter'
    FilterAdvanced:
      name: filter_advanced
      in: query
      required: false
      schema:
        type: string
      description: |
        Advanced filter expression for complex queries supporting logical operators and nested conditions.
        Extends the basic filter parameter with more sophisticated query capabilities.
        Allows combining multiple filter conditions using logical operators (AND, OR, NOT).
        Use this for complex filtering scenarios that cannot be expressed with the simple filter parameter.
    Sort:
      $ref: 'common.yaml#/components/parameters/Sort'
    IdempotencyKey:
      $ref: 'common.yaml#/components/parameters/IdempotencyKey'

  schemas:
    ErrorResponse:
      $ref: 'common.yaml#/components/schemas/ErrorResponse'
    ErrorItem:
      $ref: 'common.yaml#/components/schemas/ErrorItem'

    Meta:
      $ref: 'common.yaml#/components/schemas/Meta'
    Links:
      $ref: 'common.yaml#/components/schemas/Links'

    RequestEnvelope:
      $ref: 'common.yaml#/components/schemas/RequestEnvelope'
    ResponseEnvelope:
      $ref: 'common.yaml#/components/schemas/ResponseEnvelope'

    RelationshipsEnvelope:
      description: Enveloped list of relationships
      allOf:
        - $ref: "#/components/schemas/ResponseEnvelope"
        - type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/RelationshipResource"

    RelationshipEnvelope:
      description: Enveloped single relationship
      allOf:
        - $ref: "#/components/schemas/ResponseEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/RelationshipResource"

    RelationshipResource:
      description: Complete Relationship resource representation (read-only fields + writable properties)
      allOf:
        - $ref: "#/components/schemas/DefaultProperties"
        - $ref: "#/components/schemas/RelationshipProperties"

    CreateRelationshipRequest:
      description: Request body for creating a relationship
      allOf:
        - $ref: "#/components/schemas/RequestEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CreateRelationshipRequestData"

    UpdateRelationshipRequest:
      description: Request body for updating a relationship with partial resource replacement
      allOf:
        - $ref: "#/components/schemas/RequestEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/UpdateRelationshipProperties"

    UpdateRelationshipProperties:
      description: Properties that can be updated on a Relationship (excludes immutable fields like entityAId, entityBId, relationshipClass)
      allOf:
        - $ref: "#/components/schemas/Payload"
        - type: object
          required: ["relationshipClassVersion"]
          properties:
            relationshipClassVersion:
              type: integer
              minimum: 1
              description: Version of the relationship class
            status:
              type: string
              minLength: 1
              maxLength: 100
              description: Relationship status
      example:
        status: active
        relationshipClassVersion: 2
        payload:
          custom: fields

    EntitiesEnvelope:
      description: Enveloped list of entities
      allOf:
        - $ref: "#/components/schemas/ResponseEnvelope"
        - type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/EntityResource"

    EntityEnvelope:
      description: Enveloped single entity
      allOf:
        - $ref: "#/components/schemas/ResponseEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/EntityResource"

    EntityResource:
      description: Complete Entity resource representation (read-only fields + writable properties)
      allOf:
        - $ref: "#/components/schemas/DefaultProperties"
        - $ref: "#/components/schemas/EntityProperties"

    UpdateEntityRequest:
      description: Request body for updating an entity with complete resource replacement
      allOf:
        - $ref: "#/components/schemas/RequestEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/UpdateEntityProperties"

    UpdateEntityProperties:
      description: Properties that can be updated on an Entity (excludes entityClass which is immutable)
      allOf:
        - $ref: "#/components/schemas/Payload"
        - type: object
          required: ["entityClassVersion"]
          properties:
            entityClassVersion:
              type: integer
              minimum: 1
              description: Schema version of the entity payload
            status:
              type: string
              minLength: 1
              maxLength: 100
              description: Entity status
      example:
        status: active
        entityClassVersion: 2
        payload:
          custom: fields

    CreateEntityRequest:
      description: Request body for creating an entity
      allOf:
        - $ref: "#/components/schemas/RequestEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CreateEntityRequestData"

    UsersEnvelope:
      description: Enveloped list of users
      allOf:
        - $ref: "#/components/schemas/ResponseEnvelope"
        - type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/EntityResource"

    UserEnvelope:
      description: Enveloped single user
      allOf:
        - $ref: "#/components/schemas/ResponseEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/EntityResource"

    UpdateUserRequest:
      description: Request body for updating a user
      allOf:
        - $ref: "#/components/schemas/RequestEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/UpdateEntityProperties"

    CreateUserRequest:
      description: Request body for creating a user
      allOf:
        - $ref: "#/components/schemas/RequestEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CreateUserRequestData"

    ChannelsEnvelope:
      description: Enveloped list of channels
      allOf:
        - $ref: "#/components/schemas/ResponseEnvelope"
        - type: object
          required:
            - data
          properties:
            data:
