openapi: 3.0.3
info:
  title: Object Management API
  version: 4.0.0
paths:
  /subkeys/{subKey}/relationships:
    get:
      tags:
        - relationship
      operationId: getRelationships
      summary: Get relationships by entity_a_id or entity_b_id
      parameters:
        - name: subKey
          in: path
          required: true
          schema:
            type: string
          description: PubNub subkey
        - name: relationship_class
          in: query
          required: true
          schema:
            type: string
          description: Relationship class name
        - name: entity_a_id
          in: query
          required: false
          schema:
            type: string
          description: Filter relationships by entity A ID
        - name: entity_b_id
          in: query
          required: false
          schema:
            type: string
          description: Filter relationships by entity B ID
        - name: relationship_class_version
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Schema version of the relationship class (if not provided latest version will be used)
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Filter"
        - $ref: "#/components/parameters/FilterAdvanced"
        - $ref: "#/components/parameters/Sort"
      responses:
        "200":
          $ref: "#/components/responses/RelationshipsResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "406":
          $ref: "#/components/responses/NotAcceptableResponse"
        "429":
          $ref: "#/components/responses/TooManyRequestsResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
        "503":
          $ref: "#/components/responses/ServiceUnavailableResponse"

    post:
      tags:
        - relationship
      summary: Create a new relationship
      operationId: createRelationship
      parameters:
        - name: subKey
          in: path
          required: true
          schema:
            type: string
          description: PubNub subkey
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/vnd.pubnub.objects.relationship+json;version=1:
            schema:
              $ref: "#/components/schemas/CreateRelationshipRequest"
      responses:
        "201":
          $ref: "#/components/responses/CreateRelationshipResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "406":
          $ref: "#/components/responses/NotAcceptableResponse"
        "415":
          $ref: "#/components/responses/UnsupportedMediaTypeResponse"
        "429":
          $ref: "#/components/responses/TooManyRequestsResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
        "503":
          $ref: "#/components/responses/ServiceUnavailableResponse"

  /subkeys/{subKey}/relationships/{relationshipId}:
