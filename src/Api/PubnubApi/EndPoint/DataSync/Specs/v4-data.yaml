          schema:
            type: string
          description: ID of a relationship
        - $ref: "#/components/parameters/IfMatch"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        x-codegen-request-body-name: patch
        content:
          application/json-patch+json:
            schema:
              $ref: "#/components/schemas/JsonPatch"
            example:
              - op: replace
                path: /status
                value: moderator
              - op: add
                path: /custom/role
                value: admin
